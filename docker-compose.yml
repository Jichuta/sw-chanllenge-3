services:
  postgres:
    image: postgres:16-alpine
    container_name: recruitment-db
    environment:
      POSTGRES_USER: recruitment
      POSTGRES_PASSWORD: recruitment
      POSTGRES_DB: recruitment
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recruitment"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: recruitment-app
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://recruitment:recruitment@postgres:5432/recruitment
      JWT_SECRET: local-dev-jwt-secret-change-in-production
      LOCAL_CV_STORAGE_PATH: /data/cvs
      NODE_ENV: production
    volumes:
      - cv_storage:/data/cvs
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  cv_storage:
